<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR Model Loader</title>
<script src="ar-launch.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>AR Model Loader</h1>
<div class="button-group">

</div>
</body>
</html>
